<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Healthy Hero Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(160deg, #e8f5e9 0%, #fff9c4 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 12px;
  overflow-x: hidden;
}

#app {
  width: 100%;
  max-width: 480px;
  background: white;
  border-radius: 28px;
  padding: clamp(16px, 5vw, 32px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  position: relative;
  z-index: 1;
  margin-top: 8px;
}

h1 {
  font-size: clamp(1.3em, 6vw, 1.9em);
  margin-bottom: 12px;
  color: #2e7d32;
}

button {
  font-size: clamp(18px, 4.5vw, 22px);
  margin: 6px;
  padding: clamp(12px, 3vw, 16px) clamp(18px, 4vw, 24px);
  border-radius: 14px;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.result {
  font-size: clamp(20px, 5vw, 26px);
  margin-top: 16px;
  font-weight: bold;
  min-height: 1.5em;
}

canvas {
  border: 3px solid #ccc;
  border-radius: 10px;
  touch-action: none;
  cursor: crosshair;
  background: white;
  max-width: 100%;
  display: block;
  margin: 0 auto;
}

.hidden { display: none; }

.deco {
  position: fixed;
  font-size: clamp(1.2em, 4vw, 2em);
  pointer-events: none;
  user-select: none;
  z-index: 0;
  animation: floatBob 3s ease-in-out infinite;
  opacity: 0.55;
}
@media (max-width: 400px) { .deco { display: none; } }

@keyframes floatBob {
  0%,100% { transform: translateY(0)   rotate(-5deg); }
  50%      { transform: translateY(-12px) rotate(5deg); }
}

.choice-row {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 16px 0;
}

.choice-btn {
  font-size: clamp(20px, 5vw, 26px);
  padding: clamp(16px, 4vw, 22px) 20px;
  border-radius: 20px;
  border: 3px solid #ccc;
  background: #fffde7;
  cursor: pointer;
  width: 100%;
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  line-height: 1.3;
}
.choice-btn:active  { transform: scale(0.97); }
.choice-btn.correct { background: #c8e6c9; border-color: #66bb6a; }
.choice-btn.wrong   { background: #ffcdd2; border-color: #ef9a9a; }

.speak-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 8px;
}
.speak-btn {
  background: #e3f2fd;
  font-size: clamp(18px, 4vw, 22px);
  padding: 10px 20px;
  border-radius: 99px;
  flex: 1;
  max-width: 140px;
}

.progress-bar {
  height: 12px;
  background: #e0e0e0;
  border-radius: 99px;
  overflow: hidden;
  margin: 6px auto 16px;
  width: 100%;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #66bb6a, #ffca28);
  border-radius: 99px;
  transition: width 0.4s ease;
}

#nextBtn {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: white;
  border-radius: 99px;
  font-weight: bold;
  width: 100%;
  margin-top: 12px;
  box-shadow: 0 4px 12px rgba(76,175,80,0.35);
}
</style>
</head>

<body>

<span class="deco" style="top:2%;  left:2%;  animation-delay:0s">🍎</span>
<span class="deco" style="top:8%;  left:7%;  animation-delay:0.4s">🥦</span>
<span class="deco" style="top:2%;  right:2%; animation-delay:0.8s">🥕</span>
<span class="deco" style="top:8%;  right:7%; animation-delay:0.3s">🍌</span>
<span class="deco" style="top:28%; left:1%;  animation-delay:1.0s">🍊</span>
<span class="deco" style="top:33%; right:1%; animation-delay:0.6s">🫐</span>
<span class="deco" style="top:50%; left:1%;  animation-delay:1.4s">🍓</span>
<span class="deco" style="top:50%; right:1%; animation-delay:0.2s">🥝</span>
<span class="deco" style="top:68%; left:2%;  animation-delay:0.9s">🌽</span>
<span class="deco" style="top:68%; right:2%; animation-delay:1.2s">🍆</span>
<span class="deco" style="bottom:8%; left:4%;  animation-delay:0.5s">🍇</span>
<span class="deco" style="bottom:8%; right:4%; animation-delay:1.6s">🍑</span>
<span class="deco" style="bottom:2%; left:18%; animation-delay:0.7s">🥑</span>
<span class="deco" style="bottom:2%; right:18%;animation-delay:1.1s">🍋</span>

<div id="app">
  <h1>Be a Healthy Hero! 🦸‍♀️</h1>
  <div id="game"></div>
  <div class="result" id="result"></div>
  <button id="nextBtn" class="hidden"></button>
</div>

<script>

function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function cleanText(text) {
  return text.replace(/[^\x00-\x7F]/g, "").trim();
}

let correctIndex = 0, displayedQ = [];

function speakChoice(idx) {
  speak(cleanText(displayedQ[idx]));
}

// ===== 問題プール（全30問）=====
const allQuestions = [
  // 🍎 食べもの（14問）
  ["🍎 Apple",            "🍪 Cookie"],
  ["🥦 Broccoli",         "🍟 Fries"],
  ["🥕 Carrot",           "🍬 Candy"],
  ["🍌 Banana",           "🍩 Donut"],
  ["💧 Water",            "🥤 Soda"],
  ["🥛 Milk",             "🧃 Juice"],
  ["🍓 Strawberry",       "🍰 Cake"],
  ["🍚 Rice + Veggies",   "🍟 Only Fries"],
  ["🍇 Grapes",           "🍭 Lollipop"],
  ["🥗 Salad",            "🍕 Pizza Only"],
  ["🍳 Breakfast Daily",  "⏭ Skip Breakfast"],
  ["🫐 Blueberries",      "🍫 Chocolate Bar"],
  ["🥑 Avocado",          "🍟 Chips"],
  ["🍊 Orange",           "🍦 Ice Cream"],
  // 🏃 からだの習慣（10問）
  ["😴 Sleep Early",          "🌙 Stay Up Late"],
  ["🏃 Play Outside",         "🛋 Sit All Day"],
  ["🪥 Brush Teeth",          "😬 No Brushing"],
  ["🧼 Wash Hands",           "🦠 No Washing"],
  ["🛁 Take a Bath",          "😅 Skip Bath"],
  ["💧 Water After Sports",   "🧃 Juice After Sports"],
  ["🏃 Exercise Daily",       "📺 TV All Day"],
  ["😴 Sleep 9 Hours",        "😵 Sleep 4 Hours"],
  ["🌙 No Screen Before Bed", "📱 Phone in Bed"],
  ["🚶 Walk Every Day",       "🚗 Never Walk"],
  // 🧹 こころとくらし（6問）
  ["🧹 Clean Room",           "🌀 Messy Room"],
  ["🤝 Play with Friends",    "🧍 Always Alone"],
  ["😊 Talk About Feelings",  "😶 Keep Feelings Inside"],
  ["🌬 Deep Breath",          "😤 Throw Things"],
  ["🎨 Draw & Play",          "📱 Phone All Day"],
  ["😄 Be Kind",              "😠 Be Mean"],
];

// 1ゲームは4問（選択）＋最後に1問（トレース）＝計5問
const GAME_QUESTIONS = 4;

let questions = [];
let current   = 0;
let score     = 0;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startGame() {
  questions = shuffle([...allQuestions]).slice(0, GAME_QUESTIONS);
  current   = 0;
  score     = 0;
  document.getElementById("result").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");
  showQuestion();
}

function showProgress(label) {
  const total = GAME_QUESTIONS + 1; // 選択4問＋トレース1問
  const n     = label === "trace" ? total : current + 1;
  const pct   = (n / total * 100).toFixed(0);
  return `
    <p style="font-size:18px;color:#888">もんだい ${n} / ${total}</p>
    <div class="progress-bar">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
  `;
}

function showQuestion() {
  document.getElementById("result").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  if (current === GAME_QUESTIONS) {
    showTrace();
    return;
  }

  displayedQ    = [...questions[current]];
  correctIndex  = 0;
  if (Math.random() < 0.5) { displayedQ.reverse(); correctIndex = 1; }
  const q = displayedQ;

  document.getElementById("game").innerHTML = `
    ${showProgress()}
    <p style="font-size:clamp(20px,5vw,26px);font-weight:bold;margin:12px 0">Which is better? 🤔</p>
    <div class="choice-row">
      <button class="choice-btn" id="choiceBtn0" onclick="choose(0)">${q[0]}</button>
      <button class="choice-btn" id="choiceBtn1" onclick="choose(1)">${q[1]}</button>
    </div>
    <div class="speak-row">
      <button class="speak-btn" onclick="speakChoice(0)">🔊 A</button>
      <button class="speak-btn" onclick="speakChoice(1)">🔊 B</button>
    </div>
  `;

  setTimeout(() => {
    speak("Which is better? " + cleanText(q[0]) + " or " + cleanText(q[1]) + "?");
  }, 300);
}

function choose(index) {
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);

  let message;
  if (index === correctIndex) {
    score++;
    message = "Great choice! 💪";
    document.getElementById("choiceBtn" + index).classList.add("correct");
  } else {
    message = "Oops! The healthy one is better! 🌟";
    document.getElementById("choiceBtn" + index).classList.add("wrong");
    document.getElementById("choiceBtn" + correctIndex).classList.add("correct");
  }

  speak(cleanText(message));
  document.getElementById("result").innerText = message;

  setTimeout(() => {
    current++;
    showQuestion();
  }, 2000);
}

// ===== トレース（小文字の単語）=====
const traceWords = ["apple", "water", "sleep", "clean", "happy", "fruit", "veggie", "health"];

function showTrace() {
  const word = traceWords[Math.floor(Math.random() * traceWords.length)];

  document.getElementById("game").innerHTML = `
    ${showProgress("trace")}
    <p style="font-size:28px;font-weight:bold;margin:12px 0">✏️ Trace the word!</p>
    <p style="font-size:44px;font-weight:bold;color:#2e7d32;letter-spacing:6px;margin:8px 0">${word}</p>
    <canvas id="canvas" height="120" style="width:100%;max-width:400px"></canvas>
    <br>
    <button onclick="speak('${word}')" style="background:#e3f2fd;margin-top:10px">🔊 Listen</button>
    <button onclick="clearCanvas()" style="background:#fce4ec;margin-top:10px">🗑️ Clear</button>
  `;

  const canvas = document.getElementById("canvas");
  canvas.width = canvas.offsetWidth || 320;
  const ctx    = canvas.getContext("2d");
  ctx.strokeStyle = "#1565c0";
  ctx.lineWidth   = 7;
  ctx.lineCap     = "round";
  ctx.lineJoin    = "round";

  let drawing = false;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    ctx.beginPath();
    const p = getPos(e); ctx.moveTo(p.x, p.y);
  });
  canvas.addEventListener("mousemove", (e) => {
    if (!drawing) return;
    const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  });
  canvas.addEventListener("mouseup",    () => drawing = false);
  canvas.addEventListener("mouseleave", () => drawing = false);
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault(); drawing = true;
    ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y);
  }, { passive: false });
  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault(); if (!drawing) return;
    const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  }, { passive: false });
  canvas.addEventListener("touchend", () => drawing = false);

  document.getElementById("result").innerText = "Amazing! ✏️🌟";

  const btn = document.getElementById("nextBtn");
  btn.innerText = "Finish! 🎉";
  btn.onclick   = showCongrats;
  btn.classList.remove("hidden");
}

window.clearCanvas = function () {
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#1565c0";
  ctx.lineWidth   = 7;
  ctx.lineCap     = "round";
  ctx.lineJoin    = "round";
};

function playFanfare() {
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  [[523,0],[659,.18],[784,.36],[1047,.54],[784,.78],[1047,.96],[1047,1.14]].forEach(([f,t]) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = "sine"; o.frequency.value = f;
    g.gain.setValueAtTime(.35, ac.currentTime + t);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + t + .4);
    o.connect(g); g.connect(ac.destination);
    o.start(ac.currentTime + t); o.stop(ac.currentTime + t + .5);
  });
}

function showCongrats() {
  const total   = GAME_QUESTIONS;
  const stars   = score === 4 ? "⭐⭐⭐⭐" : score === 3 ? "⭐⭐⭐" : score === 2 ? "⭐⭐" : "⭐";
  const msg     = score === 4 ? "Perfect! You are a Healthy Hero! 🏆"
                : score >= 2  ? "Good job! Keep it up! 💪"
                :               "Nice try! Let's play again! 🌱";

  document.getElementById("game").innerHTML = `
    <div style="font-size:4em;margin:20px 0">🏆🎉🌟</div>
    <h2 style="color:#e05a77;font-size:1.6em">You are a Healthy Hero!</h2>
    <p style="font-size:1.4em;margin:12px 0">${stars}</p>
    <p style="font-size:1.3em;color:#555;margin-bottom:8px">Score: ${score} / ${total}</p>
    <p style="font-size:1.1em;margin-top:8px">${msg}</p>
  `;
  document.getElementById("result").innerText = "";
  playFanfare();
  const btn = document.getElementById("nextBtn");
  btn.innerText = "Play Again! 🔄";
  btn.onclick   = startGame;
  btn.classList.remove("hidden");
}

startGame();
</script>

</body>
</html>
